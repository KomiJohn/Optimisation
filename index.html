<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Card</title>
  <style>
    .pricing-card {
      width: 300px;
      margin: 20px auto;
      background-color: #fff;
      box-shadow: 0 0 10px #ccc;
      padding: 20px;
      text-align: left;
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }

    .pricing-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .pricing-price {
      font-size: 18px;
      color: green;
      margin-bottom: 15px;
    }

    .pricing-features {
      list-style: none;
      padding-left: 0;
      margin-bottom: 15px;
    }

    .pricing-features li {
      padding: 6px;
      border-bottom: 1px solid #eee;
    }

    .btn {
      background: blue;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn:hover {
      background: darkblue;
    }
  </style>
</head>
<body>

  <!-- Reusable Pricing Card Component -->
  <div class="pricing-card">
    <h2 class="pricing-title">Basic Plan</h2>
    <p class="pricing-price">$9.99 /month</p>
    <ul class="pricing-features">
      <li>1 GB Storage</li>
      <li>Basic Support</li>
      <li>All Core Features</li>
    </ul>
    <button class="btn">Start Trial</button>
  </div>

</body>
</html>
